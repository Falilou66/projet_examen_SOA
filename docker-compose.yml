version: "3.9"

networks:
  smartparking-net:
    driver: bridge

volumes:
  postgres-data:

services:

  # ── Base de données partagée ───────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sc-postgres
    environment:
      POSTGRES_DB:       sencity
      POSTGRES_USER:     admin
      POSTGRES_PASSWORD: sencity2026
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - smartparking-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d sencity"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Service Places (port 8001) ─────────────────────────────
  places:
    build: ./services/places
    container_name: sc-places
    environment:
      DB_HOST:     postgres
      DB_PORT:     5432
      DB_NAME:     sencity
      DB_USER:     svc_places
      DB_PASSWORD: places_pass
      DB_SCHEMA:   places
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - smartparking-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Service Transactions (port 8002) ───────────────────────
  transactions:
    build: ./services/transactions
    container_name: sc-transactions
    environment:
      DB_HOST:     postgres
      DB_PORT:     5432
      DB_NAME:     sencity
      DB_USER:     svc_transactions
      DB_PASSWORD: trans_pass
      DB_SCHEMA:   transactions
      PLACES_URL:  http://places:8001
    depends_on:
      postgres:
        condition: service_healthy
      places:
        condition: service_healthy
    networks:
      - smartparking-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Service Reporting (port 8003) ──────────────────────────
  reporting:
    build: ./services/reporting
    container_name: sc-reporting
    environment:
      DB_HOST:          postgres
      DB_PORT:          5432
      DB_NAME:          sencity
      DB_USER:          svc_reporting
      DB_PASSWORD:      rep_pass
      DB_SCHEMA:        reporting
      PLACES_URL:       http://places:8001
      TRANSACTIONS_URL: http://transactions:8002
    depends_on:
      postgres:
        condition: service_healthy
      places:
        condition: service_healthy
      transactions:
        condition: service_healthy
    networks:
      - smartparking-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8003/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── API Gateway (Nginx — port 8080) ────────────────────────
  gateway:
    image: nginx:alpine
    container_name: sc-gateway
    ports:
      - "8080:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      places:
        condition: service_healthy
      transactions:
        condition: service_healthy
      reporting:
        condition: service_healthy
    networks:
      - smartparking-net
    restart: unless-stopped

  # ── Simulateur Parking ─────────────────────────────────────
  simulateur:
    build: ./simulateur
    container_name: sc-simulateur
    environment:
      GATEWAY_URL:      http://gateway:80
      INTERVAL_SECONDS: 5
    depends_on:
      - gateway
    networks:
      - smartparking-net
    restart: unless-stopped

  # ── Dashboard React (port 3000) ────────────────────────────
  dashboard:
    build: ./dashboard
    container_name: sc-dashboard
    ports:
      - "3000:80"
    networks:
      - smartparking-net
    restart: unless-stopped
