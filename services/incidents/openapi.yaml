openapi: "3.0.0"
info:
  title: Service Incidents — SenCity
  version: "1.0.0"
  description: |
    Détection des dépassements de seuils, gestion des incidents environnementaux
    et des abonnements de notification Flutter.
    **Compose le Service Surveillance** pour obtenir les mesures en temps réel.
servers:
  - url: http://localhost:8080/api/incidents
  - url: http://localhost:8002

paths:
  /health:
    get:
      summary: Disponibilité du service
      tags: [Santé]
      responses:
        "200": { description: Service disponible }

  /incidents:
    get:
      summary: Lister les incidents
      tags: [Incidents]
      parameters:
        - in: query
          name: statut
          schema: { type: string, enum: [actif, resolu] }
        - in: query
          name: quartier
          schema: { type: string }
        - in: query
          name: severite
          schema: { type: string, enum: [warning, critique] }
      responses:
        "200": { description: Liste des incidents }

  /incidents/{id}:
    get:
      summary: Détail d'un incident
      tags: [Incidents]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Incident trouvé }
        "404": { description: Incident non trouvé }

  /incidents/{id}/resoudre:
    put:
      summary: Marquer un incident comme résolu
      tags: [Incidents]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200": { description: Incident résolu }
        "404": { description: Incident non trouvé }

  /regles:
    get:
      summary: Consulter les seuils de détection
      tags: [Règles]
      responses:
        "200": { description: Liste des règles }

  /regles/{type}:
    put:
      summary: Modifier les seuils d'un type de mesure
      tags: [Règles]
      parameters:
        - in: path
          name: type
          required: true
          schema: { type: string, enum: [temperature, humidite, aqi, bruit, eau] }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [seuil_warning, seuil_critique]
              properties:
                seuil_warning:  { type: number }
                seuil_critique: { type: number }
      responses:
        "200": { description: Règle mise à jour }

  /abonnements:
    post:
      summary: S'abonner aux notifications (token Flutter)
      tags: [Abonnements]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:      { type: string }
                plateforme: { type: string, default: flutter }
      responses:
        "201": { description: Abonnement créé }

  /abonnements/{token}:
    delete:
      summary: Se désabonner
      tags: [Abonnements]
      parameters:
        - in: path
          name: token
          required: true
          schema: { type: string }
      responses:
        "200": { description: Désabonnement effectué }

  /verifier:
    post:
      summary: Déclencher une vérification des seuils (composition)
      tags: [Composition]
      description: |
        Appelle le Service Surveillance (`GET /mesures/dernieres`),
        compare chaque mesure aux seuils définis, et crée les incidents détectés.
      responses:
        "200":
          description: Résultat de la vérification
          content:
            application/json:
              example:
                success: true
                data:
                  mesures_verifiees: 25
                  incidents_crees: 2
        "503":
          description: Service Surveillance inaccessible
