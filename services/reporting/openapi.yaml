openapi: "3.0.0"
info:
  title: Service Reporting — SenCity
  version: "1.0.0"
  description: |
    Agrégation, statistiques et rapports décisionnels sur les données environnementales.
    **Compose le Service Surveillance** pour construire ses analyses sans dupliquer les données.
servers:
  - url: http://localhost:8080/api/reporting
  - url: http://localhost:8003

paths:
  /health:
    get:
      summary: Disponibilité du service
      tags: [Santé]
      responses:
        "200": { description: Service disponible }

  /rapport/temps-reel:
    get:
      summary: État actuel de tous les quartiers
      tags: [Rapports]
      description: Agrège les dernières mesures par quartier en appelant le Service Surveillance.
      responses:
        "200": { description: État temps réel par quartier }
        "503": { description: Service Surveillance inaccessible }

  /rapport/statistiques:
    get:
      summary: Moyennes, min/max par type et quartier
      tags: [Rapports]
      parameters:
        - in: query
          name: periode
          schema: { type: string, enum: [1h, 24h, 7j, 30j], default: 24h }
        - in: query
          name: quartier
          schema: { type: string }
      responses:
        "200":
          description: Statistiques agrégées
          content:
            application/json:
              example:
                success: true
                data:
                  periode: 24h
                  quartiers:
                    - nom: Plateau
                      temperature:
                        moyenne: 37.4
                        min: 31.2
                        max: 43.1
                        unite: "°C"

  /rapport/historique:
    get:
      summary: Évolution des mesures sur une période
      tags: [Rapports]
      parameters:
        - in: query
          name: debut
          schema: { type: string, format: date-time }
        - in: query
          name: quartier
          schema: { type: string }
        - in: query
          name: type
          schema: { type: string }
      responses:
        "200": { description: Historique des mesures }

  /rapport/tendances:
    get:
      summary: Comparaison 24h vs 24h précédentes
      tags: [Rapports]
      responses:
        "200": { description: Tendances par indicateur }

  /rapport/export:
    get:
      summary: Export CSV des mesures
      tags: [Rapports]
      parameters:
        - in: query
          name: periode
          schema: { type: string, enum: [1j, 7j, 30j], default: 7j }
        - in: query
          name: quartier
          schema: { type: string }
      responses:
        "200":
          description: Fichier CSV
          content:
            text/csv:
              schema: { type: string, format: binary }
