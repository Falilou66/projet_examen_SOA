server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    resolver 127.0.0.11 valid=5s ipv6=off;

    # SPA — toutes les routes servent index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy vers la Gateway pour les appels API
    location /api/ {
        set $gateway http://gateway:80;
        proxy_pass $gateway;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
