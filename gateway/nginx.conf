events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    resolver 127.0.0.11 valid=5s ipv6=off;

    server {
        listen 80;

        # ── Registre SOA (proxy vers le service auth) ────────
        location = /api/registry {
            set $auth http://auth:8000;
            proxy_pass         $auth/registry;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            add_header         'Access-Control-Allow-Origin' '*' always;
            proxy_read_timeout 10s;
        }

        # ── Service Auth (port 8000) ─────────────────────────
        location /api/auth/ {
            set $auth http://auth:8000;
            rewrite ^/api/auth/(.*) /$1 break;
            proxy_pass         $auth;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   Authorization $http_authorization;
            proxy_read_timeout 10s;
        }

        # ── Service Places (port 8001) ───────────────────────
        location /api/places/ {
            set $svc http://places:8001;
            rewrite ^/api/places/(.*) /$1 break;
            proxy_pass         $svc;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   Authorization $http_authorization;
            proxy_read_timeout 30s;
        }

        # ── Service Transactions (port 8002) ─────────────────
        location /api/transactions/ {
            set $svc http://transactions:8002;
            rewrite ^/api/transactions/(.*) /$1 break;
            proxy_pass         $svc;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   Authorization $http_authorization;
            proxy_read_timeout 30s;
        }

        # ── Service Reporting (port 8003) ────────────────────
        location /api/reporting/ {
            set $svc http://reporting:8003;
            rewrite ^/api/reporting/(.*) /$1 break;
            proxy_pass         $svc;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   Authorization $http_authorization;
            proxy_read_timeout 60s;
        }

        # ── Fallback ─────────────────────────────────────────
        location / {
            add_header 'Content-Type' 'application/json' always;
            return 404 '{"error":"Endpoint non trouve sur la Gateway SmartParking"}';
        }
    }
}
