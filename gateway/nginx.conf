events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    upstream surveillance {
        server surveillance:8001;
    }
    upstream incidents {
        server incidents:8002;
    }
    upstream reporting {
        server reporting:8003;
    }

    server {
        listen 80;

        # ── Registre SOA ────────────────────────────────────
        location = /api/registry {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Content-Type' 'application/json; charset=utf-8' always;
            return 200 '{
  "registry": {
    "version": "1.0.0",
    "description": "SenCity — Registre des services SOA",
    "services": [
      {
        "id": "surveillance",
        "nom": "Service de Surveillance",
        "description": "Collecte et exposition des mesures environnementales",
        "url_interne": "http://surveillance:8001",
        "contrat": "http://localhost:8080/api/surveillance/api-docs",
        "health": "http://localhost:8080/api/surveillance/health",
        "statut": "disponible",
        "version": "1.0.0",
        "dependances": [],
        "endpoints": 7
      },
      {
        "id": "incidents",
        "nom": "Service de Gestion des Incidents",
        "description": "Detection des anomalies, alertes et notifications",
        "url_interne": "http://incidents:8002",
        "contrat": "http://localhost:8080/api/incidents/api-docs",
        "health": "http://localhost:8080/api/incidents/health",
        "statut": "disponible",
        "version": "1.0.0",
        "dependances": ["surveillance"],
        "endpoints": 9
      },
      {
        "id": "reporting",
        "nom": "Service de Reporting",
        "description": "Agregation, statistiques et rapports decisionnels",
        "url_interne": "http://reporting:8003",
        "contrat": "http://localhost:8080/api/reporting/api-docs",
        "health": "http://localhost:8080/api/reporting/health",
        "statut": "disponible",
        "version": "1.0.0",
        "dependances": ["surveillance"],
        "endpoints": 6
      }
    ]
  }
}';
        }

        # ── Service Surveillance ─────────────────────────────
        location /api/surveillance/ {
            proxy_pass         http://surveillance/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        # ── Service Incidents ────────────────────────────────
        location /api/incidents/ {
            proxy_pass         http://incidents/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        # ── Service Reporting ────────────────────────────────
        location /api/reporting/ {
            proxy_pass         http://reporting/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        # ── Fallback ─────────────────────────────────────────
        location / {
            add_header 'Content-Type' 'application/json' always;
            return 404 '{"error":"Endpoint non trouve sur la Gateway"}';
        }
    }
}
