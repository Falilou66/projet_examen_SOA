events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Resolver DNS interne Docker — résolution dynamique à chaque requête
    resolver 127.0.0.11 valid=5s ipv6=off;

    server {
        listen 80;

        # ── Registre SOA ────────────────────────────────────
        location = /api/registry {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Content-Type' 'application/json; charset=utf-8' always;
            return 200 '{
  "registry": {
    "version": "2.0.0",
    "description": "SmartParking — Registre des services SOA",
    "services": [
      {
        "id": "places",
        "nom": "Service Places",
        "description": "Gestion des places de parking et des zones (A/B/C)",
        "url_interne": "http://places:8001",
        "contrat": "http://localhost:8080/api/places/docs",
        "health": "http://localhost:8080/api/places/health",
        "statut": "disponible",
        "version": "1.0.0",
        "dependances": [],
        "endpoints": 9
      },
      {
        "id": "transactions",
        "nom": "Service Transactions",
        "description": "Gestion des entrees/sorties, facturation et alertes parking",
        "url_interne": "http://transactions:8002",
        "contrat": "http://localhost:8080/api/transactions/docs",
        "health": "http://localhost:8080/api/transactions/health",
        "statut": "disponible",
        "version": "1.0.0",
        "dependances": ["places"],
        "endpoints": 10
      },
      {
        "id": "reporting",
        "nom": "Service Reporting",
        "description": "Aggregation, statistiques et export CSV des donnees parking",
        "url_interne": "http://reporting:8003",
        "contrat": "http://localhost:8080/api/reporting/docs",
        "health": "http://localhost:8080/api/reporting/health",
        "statut": "disponible",
        "version": "1.0.0",
        "dependances": ["places", "transactions"],
        "endpoints": 6
      }
    ]
  }
}';
        }

        # ── Service Places ───────────────────────────────────
        location /api/places/ {
            set $svc http://places:8001;
            rewrite ^/api/places/(.*) /$1 break;
            proxy_pass         $svc;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── Service Transactions ─────────────────────────────
        location /api/transactions/ {
            set $svc http://transactions:8002;
            rewrite ^/api/transactions/(.*) /$1 break;
            proxy_pass         $svc;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── Service Reporting ────────────────────────────────
        location /api/reporting/ {
            set $svc http://reporting:8003;
            rewrite ^/api/reporting/(.*) /$1 break;
            proxy_pass         $svc;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        # ── Fallback ─────────────────────────────────────────
        location / {
            add_header 'Content-Type' 'application/json' always;
            return 404 '{"error":"Endpoint non trouve sur la Gateway SmartParking"}';
        }
    }
}
